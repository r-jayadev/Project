services:

    postgres:
        image: postgres:16-alpine
        container_name: postgres_db
        env_file:
            - .env
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: always
    
    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        ports:
            - "6379:6379"
volumes:
    postgres_data: